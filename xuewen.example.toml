# Copy to xuewen.toml and edit.
inbox_dir     = "./inbox"
library_root  = "./library"
database_url  = "sqlite:./library.db"

# Used in later plans (Plan 2/3). Optional now.
# grobid_url    = "http://localhost:8070"
# contact_email = "you@example.com"

# Optional: institutional proxy for fetching paywalled PDFs by URL/DOI.
# The login prefix has the target URL percent-encoded and appended. The rotating
# session cookie is NOT stored here — set it via the web UI's "Institutional
# access" panel or `xuewen proxy-cookie --set '<cookie>'`.
# [proxy]
# login_url = "https://proxy.uchicago.edu/login?url="

# Search (optional section; these are the defaults).
# Keyword full-text search always works. Semantic search additionally needs
# a running Qdrant server and the [ai.embedding] subsection with an API key.
#[search]
#index_dir         = "./search-index"       # Tantivy index (derived; safe to delete)
#qdrant_url        = "http://localhost:6333"
#qdrant_collection = "xuewen"

# Daily arXiv recommendations, shown on a Glance dashboard via /api/daily
# (optional). Requires [ai.embedding]: the library's title+abstract
# vectors are the interest profile the new papers are scored against.
#[daily]
#categories         = ["cs.AI", "cs.LG"]  # arXiv category codes (required)
#include_cross_list = false
#max_papers         = 20        # ranked papers kept per day
#run_at             = "09:00"   # daily run, UTC wall time
#retention_days     = 14

# All AI/LLM features share one section. Set the endpoint + key + default model
# once; each use overrides only what differs. Absent ⇒ that feature is off.
#[ai]
#base_url         = "https://api.openai.com/v1"  # default; any OpenAI-compatible endpoint
#api_key_env      = "OPENAI_API_KEY"             # default; or: api_key = "sk-..."
#model            = "gpt-4o-mini"                # default model for chat/summary/daily
#reasoning_effort = "high"                       # optional (reasoning models)

# Semantic search (needs Qdrant). Embeddings use their own model.
#[ai.embedding]
#model = "text-embedding-3-small"
#dims  = 1536

# Paper chat (one entry per selectable model).
#[ai.chat]
#max_context_chars = 60000
#[[ai.chat.models]]
#label = "GPT-4o mini"
#model = "gpt-4o-mini"

# Per-paper library summaries. Empty ⇒ inherits [ai] model + reasoning_effort.
#[ai.summary]

# Daily arXiv feed summaries.
#[ai.daily]

# Structured reference parsing for the PDF reader's citation popovers.
# Empty ⇒ inherits [ai] endpoint + model.
#[ai.citations]
